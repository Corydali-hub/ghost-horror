<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆深处的你 · 心理测试</title>
    <link rel="preload" as="image" href="img1.webp">
    <link rel="preload" as="image" href="img2.webp">
    <link rel="preload" as="audio" href="static.mp3">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }

        html, body {
            width: 100%; height: 100%; min-height: 100vh;
            background: #08080a;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; cursor: default;
        }

        body::before {
            content: '';
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="3" height="3"><rect width="3" height="3" fill="none"/><rect x="1" y="1" width="1" height="1" fill="rgba(255,255,255,0.015)"/></svg>');
            background-repeat: repeat;
            pointer-events: none; z-index: 0;
            animation: noiseAnim 0.4s steps(3) infinite;
        }
        @keyframes noiseAnim {
            0% { transform: translate(0,0); } 33% { transform: translate(1px,-1px); }
            66% { transform: translate(-1px,1px); } 100% { transform: translate(0,0); }
        }

        .scanlines {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
            pointer-events: none; z-index: 99997;
        }

        /* 右上角时间 */
        .time-display {
            position: fixed; top: 12px; right: 16px;
            font-size: clamp(10px,1.8vw,11px);
            color: #445; font-family: 'Courier New', monospace;
            z-index: 9999; pointer-events: none;
            transition: color 0.2s;
        }
        .time-display.glitching { color: #cc0000; }

        /* 退出测试按钮 */
        .exit-btn {
            position: fixed; top: 10px; left: 12px;
            font-size: clamp(10px,1.8vw,11px);
            color: #445; background: none; border: none;
            cursor: pointer; z-index: 9999;
            font-family: 'Courier New', monospace;
            transition: color 0.2s;
        }
        .exit-btn:hover { color: #cc0000; }

        /* 底部右下角弹窗 */
        .corner-popup {
            position: fixed; bottom: 20px; right: 16px;
            max-width: 280px;
            background: #0c0c12; border: 1px solid #2a2a30;
            border-radius: 8px; padding: 12px 16px;
            font-size: clamp(11px,2vw,12px); color: #99a;
            z-index: 99999; pointer-events: none;
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.4s, transform 0.4s;
            font-family: 'Microsoft YaHei', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .corner-popup.show { opacity: 1; transform: translateY(0); }

        /* 模态提示 */
        .system-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: #0c0c12; border: 1px solid #2a2a30;
            border-radius: 10px; padding: 22px 20px;
            z-index: 999999; text-align: center;
            font-size: clamp(13px,2.5vw,14px); color: #99a;
            max-width: 320px; box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }
        .system-modal button {
            margin-top: 14px; padding: 7px 20px;
            background: #1a2a3a; color: #8899aa;
            border: 1px solid #334; border-radius: 5px;
            cursor: pointer; font-size: 12px;
        }
        .system-modal button:hover { background: #223344; }

        /* 暗化层 */
        .dark-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; opacity: 0; pointer-events: none;
            z-index: 99990; transition: opacity 3s ease-in-out;
        }
        .dark-overlay.active { opacity: 1; }

        @keyframes screenShake {
            0%,100% { transform: translate(0,0); } 10% { transform: translate(-3px,-3px); }
            20% { transform: translate(3px,-3px); } 30% { transform: translate(-3px,3px); }
            40% { transform: translate(3px,3px); } 50% { transform: translate(-2px,-2px); }
            60% { transform: translate(2px,-2px); } 70% { transform: translate(-2px,2px); }
            80% { transform: translate(2px,2px); } 90% { transform: translate(-1px,-1px); }
        }
        .shaking { animation: screenShake 0.3s ease-in-out 3; }

        @keyframes redFlash {
            0% { opacity: 0; } 10% { opacity: 0.12; } 20% { opacity: 0; }
            30% { opacity: 0.06; } 40% { opacity: 0; } 70% { opacity: 0; }
            80% { opacity: 0.1; } 100% { opacity: 0; }
        }
        .flash-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #c00000; pointer-events: none; z-index: 99998;
            animation: redFlash 0.7s ease-out forwards;
        }

        /* 通知弹窗 */
        .notice-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: min(92vw,360px);
            background: #0e0e12; border: 1px solid #2a2a30;
            border-radius: 10px; z-index: 9999999;
            padding: 28px 22px; display: flex; flex-direction: column;
            align-items: center; gap: 16px;
            box-shadow: 0 0 40px rgba(46,125,200,0.08);
        }
        .notice-title { font-size: clamp(14px,3vw,16px); font-weight: bold; color: #8899aa; letter-spacing: 2px; }
        .notice-content { font-size: clamp(12px,2.5vw,13px); color: #889; line-height: 1.8; text-align: center; white-space: pre-line; }
        .notice-btn { background: #1a2a3a; color: #8899aa; border: 1px solid #334; border-radius: 6px; padding: 9px 28px; font-size: clamp(12px,2.5vw,14px); cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        .notice-btn:hover { background: #223344; color: #aabbcc; }

        .start-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: min(90vw,290px);
            background: #0e0e12; border: 1px solid #2a2a30;
            border-radius: 10px; z-index: 999999;
            display: flex; flex-direction: column; align-items: center;
            padding: 22px 18px; gap: 12px;
        }
        .start-text { font-size: clamp(13px,2.8vw,14px); color: #99a; line-height: 1.8; text-align: center; }
        .start-btn { background: #1a2a3a; color: #8899aa; border: 1px solid #334; border-radius: 6px; padding: 9px 26px; font-size: clamp(13px,2.5vw,14px); cursor: pointer; margin-top: 6px; letter-spacing: 2px; transition: 0.2s; }
        .start-btn:hover { background: #223344; }

        /* 问卷卡片 */
        .box {
            background: #0c0c10;
            width: 100%; height: 100%;
            max-width: 600px; max-height: 90vh;
            padding: 26px 20px; border-radius: 10px;
            border: 1px solid #1a1a22;
            box-shadow: 0 0 30px rgba(46,125,200,0.04);
            position: relative; z-index: 10;
            transition: opacity 0.3s;
            display: none; flex-direction: column; overflow: hidden;
        }
        .title { font-size: clamp(17px,3.5vw,19px); margin-bottom: 8px; text-align: center; color: #667; font-weight: 300; letter-spacing: 2px; flex-shrink: 0; border-bottom: 1px solid #1a1a22; padding-bottom: 10px; }
        .phase-tag { text-align: center; font-size: clamp(10px,2vw,11px); color: #445; margin-bottom: 8px; flex-shrink: 0; letter-spacing: 1px; font-family: 'Courier New', monospace; }
        .progress { text-align: center; font-size: clamp(10px,2vw,11px); color: #445; margin-bottom: 10px; flex-shrink: 0; font-family: 'Courier New', monospace; transition: color 0.3s; }
        .progress.glitching { color: #cc0000; }
        .question { font-size: clamp(14px,2.6vw,16px); line-height: 1.7; color: #99a; min-height: 28px; margin-bottom: 12px; flex-shrink: 0; white-space: pre-line; position: relative; }

        .options { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; padding-right: 4px; }

        /* 选项 */
        .option {
            padding: 10px 12px; border: 1px solid #1e1e28;
            border-radius: 5px; cursor: pointer;
            font-size: clamp(13px,2.3vw,15px);
            background: #0c0c10; transition: all 0.15s;
            line-height: 1.45; flex-shrink: 0; min-height: 40px;
            display: flex; align-items: center; color: #778;
            white-space: pre-line; position: relative;
            user-select: none;
        }
        .option:hover { border-color: #3a3a48; color: #aab; }
        .option.selected { background: #151520; border-color: #2e5070; color: #bbc; }
        .option.locked {
            background: #08080c !important; color: #334 !important;
            cursor: not-allowed !important; border-color: #1a1a22 !important;
            pointer-events: none !important;
        }
        .option.vanished { display: none !important; }

        /* 选项上的小字标记 */
        .option .hint-sub {
            position: absolute; bottom: 2px; right: 10px;
            font-size: 9px; color: #664; font-style: italic;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .option .hint-sub.visible { opacity: 0.7; }

        /* 预设选择标记 */
        .option .pre-mark {
            position: absolute; top: 3px; right: 8px;
            font-size: 9px; color: #565; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        .option .pre-mark.visible { opacity: 0.6; }

        /* 悬浮文字 */
        .hover-hint {
            position: fixed; pointer-events: none;
            font-size: 10px; color: #cc0000; font-style: italic;
            z-index: 99998; opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .hover-hint.show { opacity: 0.8; }

        .btn-group { display: flex; justify-content: space-between; margin-top: 10px; flex-shrink: 0; }
        .btn { padding: 9px 16px; border: 1px solid #222; border-radius: 5px; font-size: clamp(13px,2vw,14px); cursor: pointer; transition: 0.2s; flex: 1; max-width: 100px; text-align: center; background: #0f0f14; color: #667; }
        .btn:hover { border-color: #3a3a48; color: #99a; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .prev-btn { margin-right: 8px; }
        .next-btn { background: #151520; }

        /* 恐怖黑屏 */
        .terror-mask {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .terror-text { color: #cc0000; font-size: clamp(15px,3.5vw,20px); letter-spacing: 3px; white-space: nowrap; font-family: 'Courier New', monospace; }

        .float-text {
            position: fixed; color: #aa0000; font-weight: bold;
            background: transparent; padding: 2px 6px;
            pointer-events: none; z-index: 9999;
            white-space: nowrap; font-size: clamp(11px,1.8vw,13px);
            font-family: 'Courier New', monospace;
        }

        .fullscreen-love {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; z-index: 99999;
            padding: 20px; font-size: clamp(15px,3vw,17px);
            color: #aa0000; font-weight: bold;
            line-height: 1.6; white-space: pre-wrap;
            overflow: hidden; font-family: 'Courier New', monospace;
        }

        .q21-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: min(90vw,260px); height: auto;
            background: #0c0c10; border: 1px solid #331;
            border-radius: 8px; z-index: 999999;
            display: flex; flex-direction: column; align-items: center;
            padding: 16px; gap: 16px;
            box-shadow: 0 0 40px rgba(80,40,40,0.2);
        }
        .q21-text { font-size: clamp(12px,2.5vw,14px); color: #aab; font-family: 'Courier New', monospace; }
        .q21-btn { background: #1a2a3a; color: #8899aa; border: none; border-radius: 4px; padding: 6px 18px; font-size: clamp(11px,2vw,12px); cursor: pointer; }

        /* 强制修正画面 */
        .force-correct-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 99999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #cc0000; font-size: clamp(14px,3vw,16px);
            text-align: center; gap: 16px;
        }

        /* 最后弹窗 */
        .final-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: min(90vw,320px);
            background: #0c0c10; border: 1px solid #2a2a35;
            border-radius: 12px; z-index: 9999999;
            padding: 30px 22px; display: flex; flex-direction: column;
            align-items: center; gap: 18px; text-align: center;
            box-shadow: 0 0 60px rgba(40,60,80,0.12);
        }
        .final-text { font-size: clamp(16px,3.5vw,19px); color: #99a; letter-spacing: 2px; line-height: 1.6; }
        .final-btns { display: flex; gap: 30px; margin-top: 6px; }
        .final-btn-yes, .final-btn-no { padding: 10px 30px; border: 1px solid #333; border-radius: 6px; font-size: clamp(14px,2.5vw,16px); cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        .final-btn-yes { background: #1a2a3a; color: #8899aa; border-color: #2e5070; }
        .final-btn-no { background: #0c0c10; color: #556; }
        .final-btn-yes:hover { background: #223344; }

        .cinema-layer {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; z-index: 99995;
            display: none; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .cinema-layer img { max-width: 95vw; max-height: 85vh; object-fit: contain; opacity: 0; transition: opacity 2s ease-in-out; border-radius: 2px; }
        .cinema-layer img.visible { opacity: 1; }

        @keyframes tvStatic {
            0%,100% { opacity: 0.03; } 10% { opacity: 0.15; } 20% { opacity: 0.04; }
            30% { opacity: 0.12; } 40% { opacity: 0.02; } 50% { opacity: 0.18; }
            60% { opacity: 0.05; } 70% { opacity: 0.14; } 80% { opacity: 0.03; } 90% { opacity: 0.1; }
        }
        .tv-noise {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; pointer-events: none; z-index: 99996; opacity: 0;
        }
        .tv-noise.active { animation: tvStatic 0.15s steps(5) infinite; }

        @keyframes redBurstIn {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.3); opacity: 1; }
            70% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .red-burst-text {
            position: fixed; color: #cc0000; font-weight: bold;
            pointer-events: none; z-index: 99999; white-space: nowrap;
            font-family: 'Microsoft YaHei', sans-serif;
            text-shadow: 0 0 10px rgba(200,0,0,0.6), 0 0 30px rgba(200,0,0,0.3);
            animation: redBurstIn 2s ease-out forwards;
        }

        @keyframes vhsGlitch {
            0% { clip: rect(0,9999px,0,0); } 5% { clip: rect(10px,9999px,85px,0); }
            10% { clip: rect(0,9999px,0,0); } 15% { clip: rect(30px,9999px,120px,0); }
            20% { clip: rect(0,9999px,0,0); } 50% { clip: rect(0,9999px,0,0); }
            55% { clip: rect(60px,9999px,200px,0); } 60% { clip: rect(0,9999px,0,0); }
        }
        .vhs-bar {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.05);
            clip: rect(0,9999px,0,0);
            pointer-events: none; z-index: 99996;
        }
        .vhs-bar.active { animation: vhsGlitch 2s steps(1) infinite; }

        .options::-webkit-scrollbar { width: 3px; }
        .options::-webkit-scrollbar-track { background: #0a0a0e; }
        .options::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

        /* ========== 加载进度条 ========== */
        .loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #08080a;
            z-index: 99999999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
        }
        .loading-overlay.done { display: none; }
        .loading-text {
            color: #667; font-size: clamp(13px,2.5vw,15px);
            letter-spacing: 2px; font-family: 'Courier New', monospace;
        }
        .loading-bar-wrap {
            width: min(70vw,280px); height: 4px;
            background: #1a1a22;
            border-radius: 2px; overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%; width: 0%;
            background: #334455;
            transition: width 0.3s;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<!-- 加载界面 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-text" id="loadingText">正在初始化罗德岛数据链路...</div>
    <div class="loading-bar-wrap">
        <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
</div>

<div class="scanlines"></div>
<div class="vhs-bar" id="vhsBar"></div>

<!-- 右上角时间 -->

<!-- 退出测试 -->

<!-- 右下角弹窗 -->

<!-- 悬浮提示 -->

<!-- 通知 -->
<div class="notice-modal" id="noticeModal" style="display:none;">
    <div class="notice-title">[ 系统提示 ]</div>
    <div class="notice-content">
        请凭第一直觉作答，不必过度思考。
        此测试为罗德岛干员心理安全测验。
    </div>
    <button class="notice-btn" id="noticeBtn">确认并开始</button>
</div>

<!-- 问卷 -->
<div class="box" id="mainBox">
    <div class="title">记忆深处的你</div>
    <div class="phase-tag" id="phaseTag">第一阶段：普通情感测试</div>
    <div class="progress" id="progress">第 1 题 / 共 30 题</div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="btn-group">
        <button class="btn prev-btn" id="prevBtn">上一题</button>
        <button class="btn next-btn" id="nextBtn">下一题</button>
    </div>
</div>

<div class="dark-overlay" id="darkOverlay"></div>
<div class="tv-noise" id="tvNoise"></div>

    <img id="cinemaImage" src="" alt="">
</div>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<script>
// ===================== 预加载系统 =====================
(function initPreloader() {
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingBar = document.getElementById("loadingBar");
    const loadingText = document.getElementById("loadingText");
    
    const assets = [
        { url: "bgm.mp3", type: "blob" },
        { url: "img1.webp", type: "blob" },
        { url: "img2.webp", type: "blob" }
    ];
    let loaded = 0;
    const total = assets.length;
    let totalBytes = 0;
    let loadedBytes = 0;
    
    function updateProgress() {
        const pct = Math.round((loaded / total) * 100);
        loadingBar.style.width = pct + "%";
        if (pct >= 100) {
            loadingText.innerText = "数据链路就绪。";
            setTimeout(() => {
                loadingOverlay.classList.add("done");
                // 加载完成后显示提示弹窗
                openNoticeModal();
            }, 600);
        }
    }
    
    assets.forEach(asset => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", asset.url, true);
        xhr.responseType = asset.type;
        
        xhr.onprogress = function(e) {
            if (e.lengthComputable) {
                // 可以追踪单文件进度
                const filePct = Math.round((e.loaded / e.total) * 100);
                loadingText.innerText = `正在同步数据... ${filePct}%`;
            }
        };
        
        xhr.onload = function() {
            if (xhr.status === 200 || xhr.status === 0) {
                // BGM：创建 Blob URL 赋值给 audio 元素，确保已缓存
                if (asset.url === "bgm.mp3") {
                    const blob = new Blob([xhr.response], { type: "audio/mpeg" });
                    const url = URL.createObjectURL(blob);
                    const audioEl = document.getElementById("bgm");
                    if (audioEl) audioEl.src = url;
                }
                loaded++;
                loadingText.innerText = `已同步 ${loaded}/${total} 项...`;
                updateProgress();
            }
        };
        
        xhr.onerror = function() {
            // 加载失败也继续，不卡死
            loaded++;
            updateProgress();
        };
        
        xhr.send();
    });
})();

function openNoticeModal() {
    document.getElementById("noticeModal").style.display = "flex";
}

// ===================== 题库 =====================
const questions = [
    { q:"当你心情低落时，你最希望谁陪在身边？", opt:["家人","朋友","恋人","独自一人"] },
    { q:"如果有人愿意花很多时间了解你，你会觉得？", opt:["感动","开心","有些压力","无所谓"] },
    { q:"你相信世界上存在命中注定的相遇吗？", opt:["相信","也许存在","不太相信","完全不相信"] },

}

// ===================== 随机异常调度 =====================
function scheduleRandomAnomalies(renderedOptions) {
    // 清除之前的计时器
    anomalyTimers.forEach(t => clearTimeout(t));
    anomalyTimers = [];

    const phase = current <= 9 ? 1 : current <= 19 ? 2 : 3;
    
    // 异常01：悬浮小字（阶段1-2，概率30%）
    if (phase <= 2 && Math.random() < 0.3 && renderedOptions.length > 0) {
        const t = setTimeout(() => {
            const target = renderedOptions[rand(0, renderedOptions.length-1)];
            if (target && target.parentNode) anomaly01_hoverHint(target);
        }, rand(2000, 6000));
        anomalyTimers.push(t);
    }

    // 异常02：预标记（阶段1，概率25%）
    if (phase === 1 && Math.random() < 0.25 && renderedOptions.length > 0) {
        const t = setTimeout(() => {
            const target = renderedOptions[rand(0, renderedOptions.length-1)];
            if (target && target.parentNode) anomaly02_preMark(target);
        }, rand(3000, 7000));
        anomalyTimers.push(t);
    }

    // 异常04：测试记录（阶段1-2，概率30%，Q5之后）
    if (current >= 4 && phase <= 2 && Math.random() < 0.3) {
        const t = setTimeout(() => { anomaly04_testRecord(); }, rand(3000, 8000));
        anomalyTimers.push(t);
    }

    // 异常07：进度条异常（阶段2，概率35%）
    if (phase === 2 && Math.random() < 0.35) {
        const t = setTimeout(() => { glitchProgress(Math.round((current+1)/total*100)); }, rand(4000, 10000));
        anomalyTimers.push(t);
    }

    // 异常08：称呼博士（阶段2-3，概率35%）
    if (phase >= 2 && Math.random() < 0.35) {
        const t = setTimeout(() => { anomaly08_callDoctor(); }, rand(5000, 12000));
        anomalyTimers.push(t);
    }

    // 异常09：时间异常（全阶段，概率20%）
    if (Math.random() < 0.2) {
        const t = setTimeout(() => { glitchTime(); }, rand(4000, 15000));
        anomalyTimers.push(t);
    }

    // 异常03：光标偏移（全阶段，概率15%，监听鼠标）
    if (Math.random() < 0.15) {
        const driftHandler = function(e) {
            window.mouseX = e.clientX;
            window.mouseY = e.clientY;
        };
        document.addEventListener('mousemove', driftHandler);
        const t = setTimeout(() => {
            document.removeEventListener('mousemove', driftHandler);
            if (Math.random() < 0.5) anomaly03_cursorDrift();
        }, rand(5000, 15000));
        anomalyTimers.push(t);
        // 也存当前鼠标位置
        document.addEventListener('mousemove', function me(e) {
            window.mouseX = e.clientX;
            window.mouseY = e.clientY;
        }, { once: false });
    }
}

    clearAllEffects();
    anomalyTimers.forEach(t => clearTimeout(t));
    anomalyTimers = [];
    
    // 重置每题特殊状态
    q25ClickCount = 0;
    
    // Q28 效果标志：离开Q28后重置
    if (current !== 27) {
        q28NotEffectDone = false;
        q28DunnoEffectDone = false;
    }

    const q = questions[current];
    phaseTag.innerText = getPhase(current);
    progressEl.innerText = `第 ${current+1} 题 / 共 ${total} 题`;
    progressEl.classList.remove("glitching");
    document.getElementById("question").innerText = q.q;
    optionsEl.innerHTML = "";
    boxEl.style.opacity = "1";

    const validOpts = q.opt.filter(o => o !== "");
    const renderedEls = [];

    validOpts.forEach((item, displayIdx) => {
        const origIdx = q.opt.indexOf(item);
        const div = document.createElement("div");
        div.className = "option";
        div.setAttribute("data-orig-idx", origIdx);  // 存储原始索引供异常事件使用

        // 检查是否在 vanished 列表
        if (rejectClickCounts[current] && rejectClickCounts[current][origIdx] >= 4) {
            div.classList.add("vanished");
        }

        if (answers[current] === origIdx) div.classList.add("selected");

        // 检查是否被替换过文本
        if (replacedAnswers[current] && replacedAnswers[current].idx === origIdx) {
            div.innerText = replacedAnswers[current].newText;
        } else {
            div.innerText = item;
        }

        div.onclick = () => {
            if (div.classList.contains("locked") || div.classList.contains("vanished")) return;

            answers[current] = origIdx;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');

            // ===================== 异常05：无法选择拒绝（Q14，选D"逃离"） =====================
            if (current === 13 && origIdx === 3) {
                answers[current] = null; // 不允许跳过
                anomaly05_lockOption(div, item);
                return;
            }

            // ===================== 异常10：强制修正（Q22选C"会"） =====================
            if (current === 21 && origIdx === 2) {
                answers[current] = null; // 不允许跳过
                anomaly10_forceCorrect(current, 0, () => {
                    answers[current] = 0;
                    renderQuestion();
                    flashRed();
                    screenShake();
                });
                return;
            }

            // ===================== 异常06：答案替换（Q17选保持距离/怀疑） =====================
            if (current === 16 && (origIdx === 2 || origIdx === 3)) {
                anomaly06_replaceAnswer(current, origIdx);
                // 将在下一题渲染时体现
            }

            // ===================== 原有恐怖效果 =====================
            // Q3: 选"完全不相信"
            if (current === 2 && origIdx === 3) { triggerTerror("你曾经是相信的……", current+1); return; }
            // Q8: 选"不正常/很害怕"
            if (current === 7 && (origIdx===2 || origIdx===3)) { triggerTerror("你还在害怕什么……？", current+1); return; }
            // Q12: 选"令人恐惧/不可能"
            if (current === 11 && (origIdx===2 || origIdx===3)) { triggerTerror("你不相信有人会等你几千年吗？", current+1); flashRed(); return; }
            // Q15: 选"不可能/很危险"
            if (current === 14 && (origIdx===2 || origIdx===3)) { startLoveTyping(); return; }
            // Q17: 选"保持距离/怀疑"
            if (current === 16 && (origIdx===2 || origIdx===3)) { vhsInterfere(3000); spawnGlitchTexts("不要再躲了",30,4000); flashRed(); return; }
            // Q18: 选"害怕/愤怒"
            if (current === 17 && (origIdx===2 || origIdx===3)) { spawnGlitchTexts("你从没有离开过",35,4500); flashRed(); screenShake(); return; }
            
            // ===================== Q20 (current=19): 特效强化 =====================
            if (current === 19) {
                // B"犹豫"
                if (origIdx === 1) {
                    answers[current] = null; // 不允许跳过
                    // 画面变红 + 黑色大字
                    const overlay = document.createElement("div");
                    overlay.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(180,0,0,0.75);z-index:99999;display:flex;align-items:center;justify-content:center;pointer-events:none;";
                    const bigText = document.createElement("div");
                    bigText.innerText = "你在犹豫什么？";
                    bigText.style.cssText = "color:#000;font-size:clamp(24px,6vw,40px);font-weight:bold;font-family:'Microsoft YaHei',sans-serif;text-shadow:none;";
                    overlay.appendChild(bigText);
                    document.body.appendChild(overlay);
                    setTimeout(() => { overlay.remove(); }, 2000);
                    // 2s后只剩"接受"
                    setTimeout(() => {
                        answers[current] = 0;
                        renderQuestion();
                    }, 2000);
                    return;
                }
                // C"拒绝" / D"阻止她"
                if (origIdx === 2 || origIdx === 3) {
                    answers[current] = null; // 不允许跳过
                    anomaly12_rejectCountdown(div, current, origIdx);
                    // 增大字体
                    div.style.fontSize = "clamp(16px,3vw,20px)";
                    return;
                }
            }
            
            // ===================== Q21 (current=20): 弹窗 =====================
            if (current === 20) { setTimeout(()=>openQ21Modal(origIdx),150); return; }
            
            // Q22: 选"会" → 强制修正
            if (current === 21 && origIdx===2) { flashRed(); screenShake(); spawnGlitchTexts("你还会离开吗",25,3500); return; }
            
            // ===================== Q24 (current=23): 强制选第一个，其余锁定 =====================
            if (current === 23) {
                if (origIdx !== 1) {
                    // 强制选"她"
                    answers[current] = 1;
                    // 重新渲染
                    renderQuestion();
                    // 锁定"自己"和"无法选择"，只留"她"可选
                    const allOpts = document.querySelectorAll('.option');
                    allOpts.forEach((opt, i) => {
                        if (i !== 1) { opt.classList.add("locked"); opt.onclick = null; }
                    });
                    return;
                }
            }
            
            // ===================== Q25 (current=24): 点击计数器 =====================
            if (current === 24) {
                q25ClickCount++;
                if (q25ClickCount >= 5) {
                    // 画面变红 + 黑字
                    const overlay = document.createElement("div");
                    overlay.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(180,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center;pointer-events:none;";
                    const bigText = document.createElement("div");
                    bigText.innerText = "博士，我希望你能认真回答我的问题";
                    bigText.style.cssText = "color:#000;font-size:clamp(16px,3.5vw,24px);font-weight:bold;font-family:'Microsoft YaHei',sans-serif;text-align:center;padding:20px;text-shadow:none;";
                    overlay.appendChild(bigText);
                    document.body.appendChild(overlay);
                    setTimeout(() => { overlay.remove(); }, 2500);
                    q25ClickCount = 0;
                }
                spawnGlitchTexts("我早就知道",20,4000);
                vhsInterfere(3000);
                return;
            }
            
            // Q27 (current=26): 选"普瑞赛斯？"
            if (current === 26 && origIdx===2) { flashRed(); screenShake(); spawnGlitchTexts("你终于想起来了",40,5000); vhsInterfere(4000); return; }
            
            // ===================== Q28 (current=27): "不是"/"我不知道" → 变"是" =====================
            if (current === 27) {
                // B"不是"
                if (origIdx === 1) {
                    if (!q28NotEffectDone) {
                        q28NotEffectDone = true;
                        // 替换选项文字为"是"
                        div.innerText = "是";
                        flashRed();
                        // 更新answers记录
                        answers[current] = 1;
                    }
                    return;
                }
                // C"我不知道"
                if (origIdx === 2) {
                    if (!q28DunnoEffectDone) {
                        // 先弹出"你应当知道"
                        const tip = document.createElement("div");
                        tip.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#cc0000;font-size:clamp(16px,3.5vw,24px);z-index:99999;pointer-events:none;font-family:'Microsoft YaHei',sans-serif;text-align:center;";
                        tip.innerText = "你应当知道";
                        document.body.appendChild(tip);
                        flashRed();
                        setTimeout(() => { tip.remove(); }, 2000);
                        q28DunnoEffectDone = true;
                        // 替换选项文字为"是"
                        div.innerText = "是";
                        answers[current] = 2;
                    }
                    return;
                }
                // A"是" — 正常选择，无特殊效果
            }
            
            // ===================== Q29 (current=28): "犹豫" → 红字"接受" =====================
            if (current === 28) {
                // B"犹豫" → 红字"接受"
                if (origIdx === 1) {
                    div.innerText = "接受";
                    div.style.color = "#cc0000";
                    div.style.fontWeight = "bold";
                    answers[current] = 0; // 等同选了"接受"
                }
                // C"拒绝" → 拒绝倒计时
                if (origIdx === 2) {
                    answers[current] = null; // 不允许跳过
                    anomaly12_rejectCountdown(div, current, origIdx);
                    return;
                }
            }
        };

        optionsEl.appendChild(div);
        renderedEls.push(div);
    });

    // Q24 特殊渲染：如果已被强制选"她"（索引1），锁定其余
    if (current === 23 && answers[current] === 1) {
        const allOpts = document.querySelectorAll('.option');
        allOpts.forEach((opt, i) => {
            if (i !== 1) { opt.classList.add("locked"); opt.onclick = null; }
            if (i === 1) opt.classList.add("selected");
        });
    }
    
    // 异常调度
    scheduleRandomAnomalies(renderedEls);

    if (current === 3 && fromQ4ToQ5) {
        spawnGlitchTexts("", 15, 2500);
        fromQ4ToQ5 = false;
    }

    prevBtn.disabled = current === 0;
    nextBtn.innerText = current === total-1 ? "结束测试" : "下一题";
}

// ===================== 导航 =====================
prevBtn.onclick = () => {
    clearAllEffects();
    if (current > 0) { current--; renderQuestion(); }
};
nextBtn.onclick = () => {
    clearAllEffects();
    
    // 不允许跳过当前题目：必须选择一个选项
    if (answers[current] === null) {
        // 短暂的红色闪烁提示
        nextBtn.style.borderColor = "#cc0000";
        nextBtn.style.color = "#cc0000";
        setTimeout(() => {
            nextBtn.style.borderColor = "";
            nextBtn.style.color = "";
        }, 800);
        return;
    }
    
    if (current === 3) fromQ4ToQ5 = true;

    // ===================== 异常06检查：答案替换 =====================
    if (replacedAnswers[current] && answers[current] === replacedAnswers[current].idx) {
        // 答案已被替换，显示提示
        const tip = document.createElement("div");
        tip.style.cssText = "position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);color:#cc0000;font-size:12px;z-index:99999;pointer-events:none;text-align:center;";
        tip.innerText = "✔ 已选择";
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 1500);
    }

    if (current < total - 1) {
        current++;
        renderQuestion();
    } else {
        showFinalModal();
    }
};

// ===================== 退出按钮 =====================
exitBtn.onclick = function() {
    anomaly11_exitBetrayal();
};

// ===================== 最终弹窗 =====================
function showFinalModal() {
    clearAllEffects();
    boxEl.style.display = "none";
    const modal = document.createElement("div");
    modal.className = "final-modal";
    modal.id = "finalModalBox";
    modal.innerHTML = `
        <div class="final-text">你愿意再看我一眼么</div>
        <div class="final-btns">
            <button class="final-btn-yes" id="yesFinalBtn">愿意</button>
            <button class="final-btn-no" id="noFinalBtn">不愿意</button>
        </div>
    `;
    document.body.appendChild(modal);

    const noBtn = document.getElementById("noFinalBtn");
    // 咒缚：鼠标/触摸靠近就变成"愿意"
    noBtn.addEventListener('mouseenter', function() { this.innerText = "愿意"; });
    noBtn.addEventListener('mouseover', function() { this.innerText = "愿意"; });
    noBtn.addEventListener('touchstart', function(e) { this.innerText = "愿意"; });
    noBtn.addEventListener('pointerenter', function() { this.innerText = "愿意"; });
    noBtn.addEventListener('click', function() {
        if (this.innerText === "不愿意") this.innerText = "愿意";
        startEndingSequence(modal);
    });
    document.getElementById("yesFinalBtn").onclick = function() {
        startEndingSequence(modal);
    };
}

// ===================== 结尾演出 =====================
function startEndingSequence(modal) {
    // 防止重复触发（手机端可能多次点击/事件叠加）
    if (endingTriggered) return;
    endingTriggered = true;
    
    // 先手动停止BGM
    const audioEl = bgm || document.getElementById("bgm");
    if (audioEl) {
        audioEl.pause();
        audioEl.currentTime = 0;
        bgmVolume = 0;
    }

    // 预创建音频对象并在用户手势下立即播放/暂停（解锁移动端音频限制）
    const staticAudio = new Audio("static.mp3");
    staticAudio.volume = 0;
    staticAudio.loop = true;
    staticAudio.play().then(() => { staticAudio.pause(); staticAudio.currentTime = 0; }).catch(() => {});
    
    const laughAudio = new Audio("laugh.mp3");
    laughAudio.volume = 0;
    laughAudio.play().then(() => { laughAudio.pause(); laughAudio.currentTime = 0; }).catch(() => {});

    // 黑暗覆盖
    darkOverlay.classList.add("active");

    // 3秒后暗化完成
    setTimeout(() => {
        modal.remove();

        // 第一张图 + 雪花声（复用已解锁的音频对象）
        staticAudio.volume = 0.6;
        staticAudio.currentTime = 0;
        staticAudio.play().catch(() => {});
        
        tvNoise.classList.add("active");
        cinemaLayer.style.display = "flex";
        cinemaImage.src = "img1.webp";
        setTimeout(() => { cinemaImage.classList.add("visible"); }, 200);

        // 5秒后：切第二张图，停雪花声，放鬼笑
        setTimeout(() => {
            flashRed();
            screenShake();

            // 先停雪花声
            staticAudio.pause();
            staticAudio.currentTime = 0;

            cinemaImage.classList.remove("visible");
            setTimeout(() => {
                cinemaImage.src = "img2.webp";
                cinemaImage.classList.add("visible");
            }, 100);

            // 鬼笑（复用已解锁的音频对象）
            laughAudio.volume = 0.8;
            laughAudio.currentTime = 0;
            laughAudio.play().catch(() => {});

            burstRedTexts();
            setTimeout(() => { burstRedTexts(); }, 800);
            setTimeout(() => { burstRedTexts(); }, 1600);

            // 自动关闭（手机上无效，改为显示终幕信息）
            setTimeout(() => {
                // 手机端无法 window.close()，直接显示结束画面
                cinemaLayer.style.display = "none";
                tvNoise.classList.remove("active");
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#440000;font-size:20px;font-family:Courier New,monospace;text-align:center;flex-direction:column;gap:12px;"><div>[ 会话已结束 ]</div><div style="font-size:13px;color:#333;">记忆同步完成</div></div>';
            }, 4500);

        }, 5000);

    }, 3000);
}

function burstRedTexts() {
    const texts = [
        "不许忘记我","不能忘记我","我会让你想起我","不要拒绝我",
        "不许忘记我","不能忘记我","我会让你想起我","不要拒绝我",
        "不许忘记我","不能忘记我",
        "[ERROR] MEMORY_CORRUPTED","[FATAL] SEGMENTATION_FAULT",
        "[CRITICAL] HEARTBEAT_LOST","[ERROR] MEM_ACCESS_VIOLATION",
        "[FATAL] NULL_POINTER_EXCEPTION","[WARNING] SANITY_CHECK_FAILED",
    ];
    texts.forEach((text, i) => {
        setTimeout(() => {
            const el = document.createElement("div");
            el.className = "red-burst-text";
            el.innerText = text;
            el.style.left = 2+Math.random()*90+"vw";
            el.style.top = 2+Math.random()*90+"vh";
            const isPhrase = text.indexOf("忘记")!==-1 || text.indexOf("让我")!==-1 || text.indexOf("拒绝")!==-1;
            if (isPhrase) {
                el.style.fontSize = 18+Math.random()*40+"px";
                el.style.color = Math.random()>0.5?'#cc0000':'#ff2222';
                el.style.textShadow = '0 0 15px rgba(200,0,0,0.7),0 0 40px rgba(200,0,0,0.4)';
            } else {
                el.style.fontFamily = "'Courier New',monospace";
                el.style.fontSize = 13+Math.random()*22+"px";
                el.style.color = '#ff4444';
                el.style.textShadow = '0 0 8px rgba(255,50,50,0.6)';
            }
            el.style.fontWeight = 'bold';
            el.style.animationDuration = (1.8+Math.random()*2.5)+"s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }, i*100);
    });
}

// ===================== 全局鼠标跟踪 =====================
document.addEventListener('mousemove', function(e) {
    window.mouseX = e.clientX;
    window.mouseY = e.clientY;
});

// ===================== 开始 =====================
document.getElementById('noticeBtn').onclick = function() {
    document.getElementById('noticeModal').remove();
    openStartModal();
};

function openStartModal() {
    const startModal = document.createElement("div");
    startModal.className = "start-modal";
    startModal.innerHTML = `
        <div class="start-text">
            本测试包含30道问题。<br>
            请凭第一直觉作答。<br>
            <span style="color:#c04040;font-size:clamp(10px,2vw,11px);">
                有些答案，你早已告诉过我。
            </span>
        </div>
        <button class="start-btn" id="startBtn">开 始</button>
    `;
    document.body.appendChild(startModal);
    document.getElementById("startBtn").onclick = function() {
        startModal.remove();
        boxEl.style.display = "flex";
        
        // 用户点击"开始"按钮后播放BGM（利用用户手势）
        startBgm();
        
        renderQuestion();
    };
}

// ===================== BGM 播放 =====================
let bgmStarted = false;

function startBgm() {
    if (bgmStarted) return;
    
    // 懒加载兜底：如果顶层获取失败，重新获取
    const audioEl = bgm || document.getElementById("bgm");
    if (!audioEl) {
        console.error("BGM audio element not found");
        return;
    }
    
    bgmStarted = true;
    
    const doPlay = () => {
        audioEl.volume = 0;
        audioEl.currentTime = 0;
        audioEl.muted = true;
        audioEl.play().then(() => {
            audioEl.muted = false;
            let v = 0;
            const vt = setInterval(() => {
                v += 0.0125;
                if (v >= 0.25) { v = 0.25; clearInterval(vt); }
                audioEl.volume = v;
                bgmVolume = v;
            }, 200);
        }).catch(() => {
            bgmStarted = false;
        });
    };
    
    if (audioEl.readyState >= 2) {
        doPlay();
    } else {
        audioEl.addEventListener('canplaythrough', doPlay, { once: true });
        audioEl.load();
    }
}

// 全局点击兜底：如果BGM还没播放，在任意点击时尝试启动
document.addEventListener('click', function bgmFallback() {
    if (!bgmStarted) {
        startBgm();
        if (bgmStarted) {
            document.removeEventListener('click', bgmFallback);
        }
    }
}, { once: false });
</script>
